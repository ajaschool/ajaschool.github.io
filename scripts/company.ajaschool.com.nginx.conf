server {
    listen 443 ssl;
    server_name company.ajaschool.com;

    ssl_certificate /etc/letsencrypt/live/company.ajaschool.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/company.ajaschool.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/company;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name company.ajaschool.com;
    return 301 https://$host$request_uri;
}
